name: Codecov Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install grcov
        run: cargo install grcov

      - name: Build test image
        run: docker compose -f docker-compose.test.yml build agent-test

      - name: Run tests in container
        env:
          CARGO_TARGET_DIR: /app/target
          CARGO_INCREMENTAL: 0
          RUSTFLAGS: "-C instrument-coverage"
          LLVM_PROFILE_FILE: "/app/coverage/cargo-test-%p-%m.profraw"
        run: |
          rm -rf coverage
          mkdir -p coverage

          docker compose -f docker-compose.test.yml run --rm \
            -e CARGO_TARGET_DIR \
            -e CARGO_INCREMENTAL \
            -e RUSTFLAGS \
            -e LLVM_PROFILE_FILE \
            agent-test cargo test --verbose

      - name: Verify generated coverage files
        run: |
          ls -la coverage
          find coverage -name '*.profraw' | head -50 || true
          ls -la target/debug

      - name: Generate lcov report
        run: |
          HOST_TRIPLE="$(rustc -vV | sed -n 's/^host: //p')"
          SYSROOT="$(rustc --print sysroot)"
          LLVM_PATH="$SYSROOT/lib/rustlib/$HOST_TRIPLE/bin"

          echo "HOST_TRIPLE=$HOST_TRIPLE"
          echo "SYSROOT=$SYSROOT"
          echo "LLVM_PATH=$LLVM_PATH"

          test -x "$LLVM_PATH/llvm-profdata"
          "$LLVM_PATH/llvm-profdata" --version

          grcov coverage \
            --binary-path ./target/debug \
            --llvm-path "$LLVM_PATH" \
            -s . \
            -t lcov \
            --branch \
            --ignore-not-existing \
            --ignore "/*" \
            --ignore "target/*" \
            -o lcov.info

          test -s lcov.info || (echo "lcov empty" && exit 1)

      - name: Normalize lcov paths
        run: |
          sed -i 's#SF:/app/#SF:#g' lcov.info
          echo "First source files in lcov:"
          grep '^SF:' lcov.info | head -20

      - name: Verify lcov paths exist
        run: |
          grep '^SF:' lcov.info | sed 's/^SF://' | head -20 | while read -r f; do
            test -f "$f" && echo "OK $f" || echo "MISSING $f"
          done

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          verbose: true
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}