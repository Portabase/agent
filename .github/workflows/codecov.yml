name: Codecov Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install grcov
        run: cargo install grcov

      - name: Build test image
        run: docker compose -f docker-compose.test.yml build agent-test

      - name: Run tests in container
        env:
          CARGO_TARGET_DIR: /app/target
          CARGO_INCREMENTAL: 0
          RUSTFLAGS: "-C instrument-coverage"
          LLVM_PROFILE_FILE: "/app/coverage/cargo-test-%p-%m.profraw"
        run: |
          rm -rf coverage
          mkdir -p coverage

          docker compose -f docker-compose.test.yml run --rm \
            -e CARGO_TARGET_DIR \
            -e CARGO_INCREMENTAL \
            -e RUSTFLAGS \
            -e LLVM_PROFILE_FILE \
            agent-test cargo test --verbose

      - name: Verify generated coverage files
        run: |
          ls -la coverage
          find coverage -name '*.profraw' | head -50 || true
          ls -la target/debug

      - name: Generate lcov report
        run: |
          HOST_TRIPLE="$(rustc -vV | sed -n 's/^host: //p')"
          SYSROOT="$(rustc --print sysroot)"
          LLVM_PATH="$SYSROOT/lib/rustlib/$HOST_TRIPLE/bin"

          echo "LLVM_PATH=$LLVM_PATH"

          test -x "$LLVM_PATH/llvm-profdata"
          test -x "$LLVM_PATH/llvm-cov"

          grcov . \
            --binary-path ./target/debug \
            --llvm-path "$LLVM_PATH" \
            -s . \
            --branch \
            --ignore-not-existing \
            --ignore "target/*" \
            -t lcov \
            -o lcov.info

          test -s lcov.info || (echo "lcov empty" && exit 1)

      - name: Normalize lcov paths
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          python3 <<'PY'
          from pathlib import Path
          import os

          workspace = Path(os.environ["WORKSPACE"]).resolve()
          lines = Path("lcov.info").read_text().splitlines()
          out = []

          for line in lines:
              if line.startswith("SF:"):
                  raw = line[3:]

                  if raw.startswith("/app/"):
                      raw = raw[len("/app/"):]

                  p = Path(raw)

                  if not p.is_absolute():
                      p = workspace / p

                  out.append(f"SF:{p}")
              else:
                  out.append(line)

          Path("lcov.info").write_text("\n".join(out) + "\n")
          PY

          echo "First source files in lcov:"
          grep '^SF:' lcov.info | head -20 || true

      - name: Verify lcov paths exist
        run: |
          grep '^SF:' lcov.info | sed 's/^SF://' | head -20 | while read -r f; do
            test -f "$f" && echo "OK $f" || echo "MISSING $f"
          done

      - name: Debug lcov stats
        run: |
          echo "SF count:"
          grep -c '^SF:' lcov.info || true
          echo "DA count:"
          grep -c '^DA:' lcov.info || true
          echo "end_of_record count:"
          grep -c '^end_of_record' lcov.info || true

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          verbose: true
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
