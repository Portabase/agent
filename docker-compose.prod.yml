services:
  rust-app:
#    build:
#      context: .
#      dockerfile: docker/Dockerfile
#      target: prod
    image: portabase/agent:latest
#    platform: linux/arm64
    container_name: rust-prod
    volumes:
      - ./databases.json:/config/config.json
    environment:
      #      APP_ENV: production
      LOG: info
      TZ: "Europe/Paris"
      #      DATABASES_CONFIG_FILE: "config.toml"
      EDGE_KEY: "eyJzZXJ2ZXJVcmwiOiJodHRwOi8vbG9jYWxob3N0Ojg4ODciLCJhZ2VudElkIjoiNWU1OGU2MGEtODhiMy00YTBjLWI0NDktNTQ3OWZhOTQzZDBkIiwibWFzdGVyS2V5QjY0IjoiQlhWM1hvbEM2NTZTVjdkTmdjV1BHUWxrKytycExJNmxHRGk3Q1BCNWllbz0ifQ=="
    extra_hosts:
      - "localhost:host-gateway"
    networks:
      - portabase



  db-mongodb-auth:
    container_name: db-mongodb-auth
    image: mongo:latest
    ports:
      - "27082:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: testdbauth
    command: mongod --auth
    networks:
      - portabase
    volumes:
      - mongodb-data-auth:/data/db
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 10

  db-mongodb:
    container_name: db-mongodb
    image: mongo:latest
    ports:
      - "27083:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      MONGO_INITDB_DATABASE: testdb
    networks:
      - portabase

volumes:
  mongodb-data:
  mongodb-data-auth:

networks:
  portabase:
    name: portabase_network
    external: true