  db-redis:
    image: redis:latest
    container_name: db-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: [ "redis-server", "--appendonly", "yes" ]
    networks:
      - portabase

  db-redis-auth:
    image: redis:latest
    container_name: db-redis-auth
    ports:
      - "6380:6379"
    volumes:
      - redis-data-auth:/data
    environment:
      - REDIS_PASSWORD=supersecurepassword
    command: [ "redis-server", "--requirepass", "supersecurepassword", "--appendonly", "yes" ]
    networks:
      - portabase

  db-valkey:
    image: valkey/valkey
    container_name: db-valkey
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    ports:
      - '6381:6379'
    volumes:
      - valkey-data:/data
    networks:
      - portabase

  db-valkey-auth:
    image: valkey/valkey
    container_name: db-valkey-auth
    command: >
      --requirepass "supersecurepassword"
    ports:
      - '6382:6379'
    volumes:
      - valkey-data-auth:/data
    networks:
      - portabase

