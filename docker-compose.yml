services:
  rust-app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    container_name: rust-dev
    volumes:
      - .:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - ./databases.json:/config/config.json
      #- ./databases.toml:/config/config.toml
      - /var/run/docker.sock:/var/run/docker.sock
#      - cargo-target:/app/target
      - databases_sqlite-data:/sqlite-data/workspace/data
      - ./scripts/sqlite/test-db:/sqlite-data-2/workspace/data
    environment:
      APP_ENV: development
      LOG: debug
      TZ: "Europe/Paris"
      EDGE_KEY: "eyJzZXJ2ZXJVcmwiOiJodHRwOi8vbG9jYWxob3N0Ojg4ODciLCJhZ2VudElkIjoiMDJlYjQ5MjEtY2VhZC00NjlhLTg2NzItM2IyY2YwZDEzNWE1IiwibWFzdGVyS2V5QjY0Ijoidkd4UU5vbGJxcU1XYWExQWU1Y1JDZ1BTVFBrMHo5cUJPNW5xRHN3bGh2OD0ifQ=="
      #CHUNK_SIZE_MB: "1"
      #POOLING: 1
      #DATABASES_CONFIG_FILE: "config.toml"
    extra_hosts:
      - "localhost:host-gateway"
    networks:
      - portabase
    cpus: "1.50"
    mem_limit: 4g
    memswap_limit: 4g
    pids_limit: 512


volumes:
  cargo-registry:
  cargo-git:
#  cargo-target:
  databases_sqlite-data:
    external: true

networks:
  portabase:
    name: portabase_network
    external: true

