services:
  rust-app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    container_name: rust-dev
    volumes:
      - .:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - ./databases.json:/config/config.json
      #- ./databases.toml:/config/config.toml
      #- /var/run/docker.sock:/var/run/docker.sock
      #- cargo-target:/app/target
      - databases_sqlite-data:/sqlite-data/workspace/data
      - ./scripts/sqlite/test-db:/sqlite-data-2/workspace/data
    environment:
      APP_ENV: development
      LOG: debug
      TZ: "Europe/Paris"
      EDGE_KEY: "eyJzZXJ2ZXJVcmwiOiJodHRwOi8vbG9jYWxob3N0Ojg4ODciLCJhZ2VudElkIjoiNjIyNWFlMzMtODQwMy00NmE3LWEyNDEtMjU4MTI2MjVlYTA4IiwibWFzdGVyS2V5QjY0IjoiQlhWM1hvbEM2NTZTVjdkTmdjV1BHUWxrKytycExJNmxHRGk3Q1BCNWllbz0ifQ=="
      #CHUNK_SIZE_MB: "1"
      #POOLING: 1
      #DATABASES_CONFIG_FILE: "config.toml"
    extra_hosts:
      - "localhost:host-gateway"
    networks:
      - portabase

volumes:
  cargo-registry:
  cargo-git:
  #cargo-target:
  databases_sqlite-data:
    external: true



networks:
  portabase:
    name: portabase_network
    external: true

